<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <!-- Motorcycle Rider Silhouette - simplified -->
  <defs>
    <style>
      .gold { fill: #f5a524; }
      .dark { fill: #333333; }
    </style>
  </defs>
  <!-- Speed lines -->
  <rect class="gold" x="20" y="65" width="45" height="8" rx="4"/>
  <rect class="gold" x="10" y="80" width="55" height="8" rx="4"/>
  <rect class="gold" x="25" y="95" width="40" height="8" rx="4"/>
  <!-- Package/box on back -->
  <rect class="gold" x="70" y="30" width="50" height="35" rx="4"/>
  <rect class="gold" x="60" y="40" width="40" height="30" rx="3"/>
  <!-- Rider helmet -->
  <circle class="gold" cx="160" cy="28" r="22"/>
  <rect class="gold" cx="160" x="145" y="20" width="35" height="12" rx="6"/>
  <!-- Rider body -->
  <path class="gold" d="M130,55 Q140,45 155,45 L165,50 L155,85 L130,85 Z"/>
  <!-- Rider arms -->
  <path class="gold" d="M155,55 Q170,60 180,70 L175,78 Q165,68 155,65 Z"/>
  <!-- Front wheel -->
  <circle class="gold" cx="210" cy="130" r="40" stroke="#f5a524" stroke-width="12" fill="none"/>
  <circle fill="#fff" cx="210" cy="130" r="22"/>
  <!-- Rear frame connecting -->
  <path class="gold" d="M100,85 L130,85 L180,100 L210,90 L220,110 L160,120 L100,110 Z"/>
  <!-- Text: ALiN -->
  <text x="75" y="138" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" font-style="italic">
    <tspan class="dark">AL</tspan><tspan class="dark" font-size="36">i</tspan><tspan class="dark">N</tspan>
  </text>
  <!-- Text: DIRECT -->
  <text x="88" y="168" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="4">
    <tspan class="dark">DIRECT</tspan>
  </text>
</svg>
